upstream collaboration_service_api_sessions {
    hash $collab_room consistent;
    server collaboration-service:8083;
    server collaboration-service-2:8083;
}

upstream collaboration_service_api_default {
    server collaboration-service:8083;
    server collaboration-service-2:8083;
}

upstream collaboration_service_ws_sessions {
    hash $collab_room consistent;
    server collaboration-service:8083;
    server collaboration-service-2:8083;
}

upstream collaboration_service_ws_chat {
    hash $collab_room consistent;
    server collaboration-service:8083;
    server collaboration-service-2:8083;
}

server {
    listen 80;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream_front frontend;
        proxy_pass http://$upstream_front:5173;
        proxy_set_header Host $host;
    }

    location /api/users {
        set $upstream_user user-service;
        proxy_pass http://$upstream_user:8081;
        proxy_set_header Host $host;
    }

    location /api/questions {
        set $upstream_ques question-service;
        proxy_pass http://$upstream_ques:8080;
        proxy_set_header Host $host;
    }

    location /api/matches {
        set $upstream_match matching-service;
        proxy_pass http://$upstream_match:8082;
        proxy_set_header Host $host;
    }

    location ~ ^/api/collab/sessions/([^/]+)(.*)$ {
        set $collab_room $1;
        rewrite ^/api/collab/(.*)$ /api/$1 break;
        proxy_pass http://collaboration_service_api_sessions;
        proxy_set_header Host $host;
    }

    location /api/collab/ {
        rewrite ^/api/collab/(.*)$ /api/$1 break;
        proxy_pass http://collaboration_service_api_default;
        proxy_set_header Host $host;
    }

    location = /api/collab/sessions/handoff {
        rewrite ^/api/collab/(.*)$ /api/$1 break;
        proxy_pass http://collaboration_service_api_default;
        proxy_set_header Host $host;
    }

    location = /api/collab/sessions/history {
        rewrite ^/api/collab/(.*)$ /api/$1 break;
        proxy_pass http://collaboration_service_api_default;
        proxy_set_header Host $host;
    }

    location = /api/collab/sessions/execute {
        rewrite ^/api/collab/(.*)$ /api/$1 break;
        proxy_pass http://collaboration_service_api_default;
        proxy_set_header Host $host;
    }

    location = /api/collab/sessions/explain {
        rewrite ^/api/collab/(.*)$ /api/$1 break;
        proxy_pass http://collaboration_service_api_default;
        proxy_set_header Host $host;
    }

    location = /api/collab/sessions/assistant/question {
        rewrite ^/api/collab/(.*)$ /api/$1 break;
        proxy_pass http://collaboration_service_api_default;
        proxy_set_header Host $host;
    }

    location = /api/collab/sessions/internal/attempted-questions {
        rewrite ^/api/collab/(.*)$ /api/$1 break;
        proxy_pass http://collaboration_service_api_default;
        proxy_set_header Host $host;
    }

    location /ws/matches {
        set $upstream_ws_match matching-service;
        proxy_pass http://$upstream_ws_match:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ~ ^/ws/sessions/([^/?]+) {
        set $collab_room $1;
        proxy_pass http://collaboration_service_ws_sessions;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ~ ^/ws/chat/([^/?]+) {
        set $collab_room $1;
        proxy_pass http://collaboration_service_ws_chat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
