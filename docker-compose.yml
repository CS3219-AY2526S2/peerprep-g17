services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  user-service:
    build:
      context: ./services/user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      MONGO_URI: mongodb://mongo:27017/user-service
      ALLOWED_ORIGINS: http://localhost:5173
      JWT_SECRET: dev-secret-change-me
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy

  question-service:
    build:
      context: ./services/question-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      MONGO_URI: mongodb://mongo:27017/question-service
      ALLOWED_ORIGINS: http://localhost:5173
      USER_SERVICE_URL: http://user-service:8081
    depends_on:
      mongo:
        condition: service_healthy

  collaboration-service:
    build:
      context: ./services/collaboration-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      PORT: 8083
      MONGO_URI: mongodb://mongo:27017/collaboration-service
      ALLOWED_ORIGINS: http://localhost:5173
      USER_SERVICE_URL: http://user-service:8081
      MATCHING_SERVICE_URL: http://matching-service:8082
      INTERNAL_SERVICE_TOKEN: dev-internal-service-token
      JWT_SECRET: dev-secret-change-me
    depends_on:
      mongo:
        condition: service_healthy
      user-service:
        condition: service_started

  matching-service:
    build:
      context: ./services/matching-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      MONGO_URI: mongodb://mongo:27017/matching-service
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: http://localhost:5173
      USER_SERVICE_URL: http://user-service:8081
      QUESTION_SERVICE_URL: http://question-service:8080
      COLLABORATION_SERVICE_URL: http://collaboration-service:8083
      COLLABORATION_SERVICE_STUB: "false"
      INTERNAL_SERVICE_TOKEN: dev-internal-service-token
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
      question-service:
        condition: service_started
      collaboration-service:
        condition: service_started
        
  frontend:
    build:
      context: ./frontend
      args:
        VITE_COLLAB_WS_URL: ws://localhost:8083
        VITE_COLLAB_URL: http://localhost:8083
        VITE_MATCHING_API_URL: http://localhost:8082/api/matches
        VITE_MATCHING_WS_URL: ws://localhost:8082
    restart: unless-stopped
    ports:
    - "5173:5173"
    depends_on:
      user-service:
        condition: service_started
      question-service:
        condition: service_started
      matching-service:
        condition: service_started
      collaboration-service:
        condition: service_started
  
  question-seeder:
    build:
      context: ./services/question-service
    command: npm run seed
    environment:
      MONGO_URI: mongodb://mongo:27017/question-service
    depends_on:
      mongo:
        condition: service_healthy
    restart: no

volumes:
  mongo-data:
