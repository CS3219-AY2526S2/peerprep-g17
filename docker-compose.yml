services:
  gateway:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - user-service
      - matching-service
      - collaboration-service
    restart: unless-stopped

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  piston:
    image: ghcr.io/engineer-man/piston
    restart: unless-stopped
    volumes:
      - piston-data:/piston
    tmpfs:
      - /tmp:exec
    privileged: true

  piston-installer:
    image: curlimages/curl:latest
    entrypoint:
      - sh
      - -c
      - "until curl -sf http://piston:2000/api/v2/runtimes > /dev/null; do echo 'Waiting...'; sleep 5; done && curl -s -X POST http://piston:2000/api/v2/packages -H 'Content-Type: application/json' -d '{\"language\":\"python\",\"version\":\"3.10.0\"}'"
    depends_on:
      - piston
    restart: no
  
  user-service:
    build: ./services/user-service
    restart: unless-stopped
    environment:
      PORT: 8081
      MONGO_URI: mongodb://mongo:27017/user-service
      # Use the variable from .env
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      JWT_SECRET: dev-secret-change-me
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      mongo:
        condition: service_healthy

  question-service:
    build: ./services/question-service
    restart: unless-stopped
    environment:
      PORT: 8080
      MONGO_URI: mongodb://mongo:27017/question-service
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      USER_SERVICE_URL: http://user-service:8081
    depends_on:
      mongo:
        condition: service_healthy

  collaboration-service:
    build: ./services/collaboration-service
    restart: unless-stopped
    environment:
      PORT: 8083
      MONGO_URI: mongodb://mongo:27017/collaboration-service
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      USER_SERVICE_URL: http://user-service:8081
      MATCHING_SERVICE_URL: http://matching-service:8082
      INTERNAL_SERVICE_TOKEN: dev-internal-service-token
      JWT_SECRET: dev-secret-change-me
      PISTON_URL: http://piston:2000
    depends_on:
      mongo:
        condition: service_healthy

  matching-service:
    build: ./services/matching-service
    restart: unless-stopped
    environment:
      PORT: 8082
      MONGO_URI: mongodb://mongo:27017/matching-service
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      USER_SERVICE_URL: http://user-service:8081
      QUESTION_SERVICE_URL: http://question-service:8080
      COLLABORATION_SERVICE_URL: http://collaboration-service:8083
      INTERNAL_SERVICE_TOKEN: dev-internal-service-token
      JWT_SECRET: dev-secret-change-me 
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GROQ_API_KEY: ${VITE_GROQ_API_KEY}
    restart: unless-stopped

  question-seeder:
    build:
      context: ./services/question-service
    command: npm run seed
    environment:
      MONGO_URI: mongodb://mongo:27017/question-service
    depends_on:
      mongo:
        condition: service_healthy
    restart: no

volumes:
  mongo-data:
  piston-data: