services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  user-service:
    build:
      context: ./services/user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      MONGO_URI: mongodb://mongo:27017/user-service
      ALLOWED_ORIGINS: http://localhost:5173
      JWT_SECRET: dev-secret-change-me
    depends_on:
      mongo:
        condition: service_healthy

  question-service:
    build:
      context: ./services/question-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      MONGO_URI: mongodb://mongo:27017/question-service
      ALLOWED_ORIGINS: http://localhost:5173
      USER_SERVICE_URL: http://user-service:8081
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      user-service:
        condition: service_started
      question-service:
        condition: service_started

volumes:
  mongo-data:
