name: Continuous Integration for the Collaboration Service

on:
  push:
    paths:
      - "services/collaboration-service/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "services/collaboration-service/**"
      - ".github/workflows/**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: services/collaboration-service/package-lock.json

      - name: Install dependencies
        working-directory: services/collaboration-service
        run: npm ci

      - name: Build
        working-directory: services/collaboration-service
        run: npm run build

      - name: Run tests with coverage
        working-directory: services/collaboration-service
        run: npx c8 --exclude dist/services/yjsUtils.js --reporter=lcov --reporter=text --lines 70 --branches 65 --functions 65 npm test
        env:
          MONGO_URI: mongodb://localhost:27017/peerprep-collaboration-test
          JWT_SECRET: test-secret
          PORT: 8083

      - name: Security scan
        working-directory: services/collaboration-service
        run: npm audit --audit-level=high
