name: Continuous Integration for the Collaboration Service

on:
  push:
    paths:
      - "services/collaboration-service/**"
      - ".github/workflows/collaboration-service.yml"
  pull_request:
    branches:
      - main
    paths:
      - "services/collaboration-service/**"
      - ".github/workflows/collaboration-service.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: services/collaboration-service/package-lock.json

      - name: Install dependencies
        working-directory: services/collaboration-service
        run: npm ci

      - name: Run tests
        working-directory: services/collaboration-service
        run: echo "tests pending"

      - name: Security scan
        working-directory: services/collaboration-service
        run: npm audit --audit-level=high