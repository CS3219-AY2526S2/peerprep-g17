name: Non-Functional Tests

on:
  push:
    paths:
      - "tests/nonfunctional/**"
      - ".github/workflows/**"
      - "TESTING.md"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches:
      - main
    paths:
      - "tests/nonfunctional/**"
      - ".github/workflows/**"
      - "TESTING.md"
      - "package.json"
      - "package-lock.json"

jobs:
  nonfunctional:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Start fixture service
        run: |
          node tests/nonfunctional/fixture-server.mjs > fixture.log 2>&1 &
          echo $! > fixture.pid

      - name: Wait for fixture service
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:3100/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Fixture service did not start in time"
          cat fixture.log || true
          exit 1

      - name: Run smoke load checks
        run: npm run test:nonfunctional:load

      - name: Run failure-injection checks
        run: npm run test:nonfunctional:failure

      - name: Upload non-functional artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nonfunctional-results-${{ github.sha }}
          path: |
            artifacts/nonfunctional
            fixture.log
          if-no-files-found: ignore

      - name: Stop fixture service
        if: always()
        run: |
          if [ -f fixture.pid ]; then kill $(cat fixture.pid) || true; fi
