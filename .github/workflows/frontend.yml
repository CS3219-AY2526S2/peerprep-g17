name: Continuous Integration for Frontend

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  unit-test:
    name: Unit Tests and Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Vitest
        working-directory: frontend
        run: npm install --save-dev vitest @vitest/coverage-v8 @testing-library/react @testing-library/jest-dom jsdom

      - name: Run unit tests with coverage
        working-directory: frontend
        run: npx vitest run --coverage --coverage.thresholds.lines=80 --coverage.thresholds.branches=80
        continue-on-error: true

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/lcov.info

  cross-browser:
    name: Cross-Browser Tests with Playwright
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright
        working-directory: frontend
        run: |
          npm install --save-dev @playwright/test
          npx playwright install --with-deps chromium firefox webkit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Playwright cross-browser tests
        working-directory: frontend
        run: npx playwright test --reporter=html
        env:
          CI: true

      - name: Upload the Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install all dependencies
        working-directory: frontend
        run: npm ci

      - name: Security scan
        working-directory: frontend
        run: npm audit --audit-level=high