name: Continuous Integration for the User Service

on:
  push:
    paths:
      - "services/user-service/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "services/user-service/**"
      - ".github/workflows/**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: services/user-service/package-lock.json

      - name: Install dependencies
        working-directory: services/user-service
        run: npm ci

      - name: Build
        working-directory: services/user-service
        run: npm run build

      - name: Run tests with coverage
        working-directory: services/user-service
        run: npx c8 --exclude dist/config/passport.js --exclude dist/index.js --exclude dist/scripts/** --exclude dist/lib/gridfs.js --reporter=lcov --reporter=text --lines 80 --branches 80 --functions 80 npm test
        env:
          MONGO_URI: mongodb://localhost:27017/peerprep-user-test
          JWT_SECRET: test-secret
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          GITHUB_CLIENT_ID: test-github-client-id
          GITHUB_CLIENT_SECRET: test-github-client-secret

      - name: Security scan
        working-directory: services/user-service
        run: npm audit --audit-level=high

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-user-service
          path: services/user-service/coverage/lcov.info
